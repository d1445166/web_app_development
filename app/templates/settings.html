{% extends "base.html" %}

{% block title %}設定 - 個人記帳工具{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card mt-4">
            <div class="card-header-glass p-3 px-4">
                <h6 class="mb-0 fw-semibold"><i class="bi bi-gear me-2"></i>系統警示設定</h6>
            </div>
            <div class="card-body p-4 p-md-5">
                <form action="{{ url_for('main.settings') }}" method="post">
                    <div class="mb-4 text-center">
                        <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 64px; height: 64px; background: rgba(99, 102, 241, 0.1); color: #818cf8;">
                            <i class="bi bi-shield-exclamation fs-2"></i>
                        </div>
                        <h5>餘額安全底線</h5>
                        <p style="color: var(--text-muted); font-size: 0.9rem;">當您的總餘額低於此數值時，系統會在首頁發出顯著的紅色警告提示，幫助您控管預算。</p>
                    </div>

                    <div class="mb-4">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text border-end-0 bg-transparent" style="color: #818cf8;"><i class="bi bi-currency-dollar"></i></span>
                            <input type="number" step="0.01" min="0" class="form-control border-start-0 ps-0 fw-bold fs-4 text-center" id="balance_threshold" name="balance_threshold" value="{{ current_threshold }}" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold shadow">
                        <i class="bi bi-check2-circle me-1"></i> 儲存設定
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
