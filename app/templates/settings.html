{% extends "base.html" %}

{% block title %}設定 - 個人記帳工具{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="card-title mb-0"><i class="bi bi-gear"></i> 警示設定</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('main.settings') }}" method="post">
                    <div class="mb-3">
                        <label for="balance_threshold" class="form-label">餘額警告底線</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" min="0" class="form-control" id="balance_threshold" name="balance_threshold" value="{{ current_threshold }}" required>
                        </div>
                        <div class="form-text">當您的總餘額低於此數值時，系統會在首頁發出紅色警告提示。</div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">儲存設定</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
